name: Test redis

on:
  push:
    branches: ["main"]
    paths:
      - "redis/**"
      - "tests/**"
      - ".github/workflows/test-redis.yml"
  pull_request:
    paths:
      - "redis/**"
      - "tests/**"
      - ".github/workflows/test-redis.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bindings
        uses: actions/checkout@v4
        with:
          path: bindings
          persist-credentials: false

      # The openrun checkout builds the server binary the integration tests
      # drive; the pkg/binding SDK resolves from the published module.
      - name: Checkout openrun
        uses: actions/checkout@v4
        with:
          repository: openrundev/openrun
          path: openrun7
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: bindings/redis/go.mod
          cache-dependency-path: bindings/redis/go.sum

      - name: Unit tests
        working-directory: bindings/redis
        run: |
          go vet ./...
          go test ./...

      - name: Install commander
        run: go install github.com/commander-cli/commander/v2/cmd/commander@v2.5.0

      - name: Integration tests (RPC layer, redis)
        working-directory: bindings
        run: OPENRUN_SRC="$GITHUB_WORKSPACE/openrun7" ./tests/run_int_tests.sh redis

      - name: Integration tests (RPC layer, valkey)
        working-directory: bindings
        run: |
          OPENRUN_SRC="$GITHUB_WORKSPACE/openrun7" \
          OPENRUN_TEST_REDIS_IMAGE=valkey/valkey:8-alpine \
          ./tests/run_int_tests.sh redis
